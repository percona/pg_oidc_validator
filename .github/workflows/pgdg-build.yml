name: PGDG

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  pgxs-build:
    name: Build
    runs-on: ubuntu-latest

    steps:
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          pkg-config \
          libjwt-dev \
          libcurl4-openssl-dev \
          libssl-dev \
          libreadline-dev \
          libkrb5-dev \
          zlib1g-dev \
          libxml2-dev \
          libxslt1-dev \
          uuid-dev \
          flex \
          bison

    - name: Install PG Distribution Postgresql 18
      run: |
        echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main 18" | \
          sudo tee /etc/apt/sources.list.d/pgdg.list
        wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | \
          gpg --dearmor | sudo tee /etc/apt/trusted.gpg.d/postgresql.gpg > /dev/null
        sudo apt-get update
        sudo apt-get install -y postgresql-18 postgresql-server-dev-18

    - name: Checkout pg_oidc_validator extension
      uses: actions/checkout@v4

    - name: Build pg_oidc_validator with PGDG
      run: |
        make -j USE_PGXS=1
        sudo make USE_PGXS=1 install


    - name: Create release directory
      run: |
        sudo mkdir pg-oidc-validator-pgdg18
        sudo mkdir -p pg-oidc-validator-pgdg18/usr/lib/postgresql/18/lib/
        sudo cp /usr/lib/postgresql/18/lib/pg_oidc_validator* pg-oidc-validator-pgdg18/usr/lib/postgresql/18/lib/

    - name: Upload tgz
      uses: actions/upload-artifact@v4
      with:
        name: pg-oidc-validator-pgdg18-binary
        path: pg-oidc-validator-pgdg18

    - name: Create deb
      run: |
        sudo mkdir pg-oidc-validator-pgdg18/DEBIAN
        sudo sh -c 'echo "Package: pg-oidc-validator-pgdg18" > pg-oidc-validator-pgdg18/DEBIAN/control'
        sudo sh -c 'echo "Version: 0.2" >> pg-oidc-validator-pgdg18/DEBIAN/control'
        sudo sh -c 'echo "Architecture: amd64" >> pg-oidc-validator-pgdg18/DEBIAN/control'
        sudo sh -c 'echo "Maintainer: Percona" >> pg-oidc-validator-pgdg18/DEBIAN/control'
        sudo sh -c 'echo "Description: Experimental pg-oidc-validator extension" >> pg-oidc-validator-pgdg18/DEBIAN/control'
        sudo dpkg-deb --build --root-owner-group pg-oidc-validator-pgdg18

    - name: Test deb
      run: |
        sudo rm -rf /usr/lib/postgresql/18/lib/pg_oidc_validator*
        sudo dpkg -i --debug=7777 pg-oidc-validator-pgdg18.deb

    - name: Upload deb
      uses: actions/upload-artifact@v4
      with:
        name: pg-oidc-validator-deb
        path: pg-oidc-validator-pgdg18.deb

    - name: Create tgz
      run: |
        cd pg-oidc-validator-pgdg18 && sudo tar -czvf ../pg-oidc-validator-pgdg18.tar.gz .

    - name: Upload tgz artifact
      uses: actions/upload-artifact@v4
      with:
        name: pg-oidc-validator-tgz
        path: pg-oidc-validator-pgdg18.tar.gz

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [pgxs-build]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download built package
      uses: actions/download-artifact@v4
      with:
        name: pg-oidc-validator-deb

    - name: Stop default PostgreSQL
      run: |
        sudo systemctl stop postgresql || true
        sudo systemctl disable postgresql || true

    - name: Install PostgreSQL 18
      run: |
        echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main 18" | \
          sudo tee /etc/apt/sources.list.d/pgdg.list
        wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | \
          gpg --dearmor | sudo tee /etc/apt/trusted.gpg.d/postgresql.gpg > /dev/null
        sudo apt-get update
        sudo apt-get install -y postgresql-18 libpq-oauth

    - name: Install pg_oidc_validator package
      run: |
        sudo dpkg -i pg-oidc-validator-pgdg18.deb

    - name: Install test dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ruby-full ruby-bundler chromium-browser chromium-chromedriver curl net-tools

    - name: Set up Ruby gems
      run: |
        cd test
        bundle config set --local path 'vendor/bundle'
        bundle install

    - name: Install SSL certificate for psql
      run: |
        sudo cp test/keys/crt.pem /usr/local/share/ca-certificates/keycloak-test.crt
        sudo update-ca-certificates

    - name: Run tests
      run: |
        cd test
        echo "PostgreSQL version:"
        /usr/lib/postgresql/18/bin/postgres --version
        echo "Port 5432 status:"
        sudo netstat -tulpn | grep 5432 || echo "Port 5432 not in use"
        echo "Chromium version:"
        chromium-browser --version || echo "Chromium not found"
        echo "ChromeDriver version:"
        chromedriver --version || echo "ChromeDriver not found"
        echo "Running tests..."
        PGBIN=/usr/lib/postgresql/18/bin bundle exec rspec --format documentation

    - name: Upload test logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-logs
        path: |
          test/postgres.log
          test/psql_output.log
          test/selenium_output.log
          test/pgdata/log/*
          /var/log/postgresql/*
        if-no-files-found: ignore

    - name: Download tgz artifact
      if: "github.repository == 'Percona-Lab/pg_oidc_validator' && github.ref_name == 'main' && (github.event_name == 'push' || github.event_name == 'schedule')"
      uses: actions/download-artifact@v4
      with:
        name: pg-oidc-validator-tgz

    - name: Publish release
      uses: ncipollo/release-action@v1
      if: "github.repository == 'Percona-Lab/pg_oidc_validator' && github.ref_name == 'main' && (github.event_name == 'push' || github.event_name == 'schedule')"
      with:
        artifacts: "pg-oidc-validator-pgdg18.tar.gz,pg-oidc-validator-pgdg18.deb"
        omitBody: true
        allowUpdates: true
        generateReleaseNotes: true
        makeLatest: true
        tag: "latest"
        name: "HEAD"
        replacesArtifacts: true
